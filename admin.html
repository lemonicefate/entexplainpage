<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>衛教管理 — Admin</title>
<style>
:root {
  --bg-primary: #FFFFFF;
  --bg-dark: #0f2a42;
  --bg-muted: #f5faf8;
  --accent: #0e7c7b;
  --accent-hover: #0a6968;
  --text-primary: #0f2a42;
  --text-light: #FFFFFF;
  --text-muted: #56706c;
  --text-disabled: #8aa3a0;
  --overlay: rgba(15,42,66,0.78);
  --border-light: #eaf2ef;
  --danger: #b91c1c;
  --danger-bg: #fde8e8;
  --radius: 10px;
  --space-xs: 8px;
  --space-sm: 16px;
  --space-md: 24px;
  --shadow: 0 1px 2px rgba(15,42,66,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Noto Sans TC", -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg-muted);
  color: var(--text-primary);
  line-height: 1.5;
}

.layout {
  display: grid;
  grid-template-columns: 60fr 40fr;
  gap: var(--space-md);
  max-width: 1400px;
  margin: 0 auto;
  padding: var(--space-md);
  min-height: 100vh;
}

/* Left column */
.left-col {
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
}

.header {
  display: flex;
  align-items: baseline;
  gap: var(--space-sm);
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
}

.header a {
  color: var(--accent);
  text-decoration: none;
  font-size: 0.875rem;
}

.header a:hover { text-decoration: underline; }

/* Existing procedures list */
.proc-list {
  background: var(--bg-primary);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: var(--space-sm);
}

.proc-list h2 {
  font-size: 1rem;
  margin-bottom: var(--space-xs);
  color: var(--text-muted);
}

.proc-list-empty {
  color: var(--text-disabled);
  font-size: 0.875rem;
}

.proc-row {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs) 0;
  border-bottom: 1px solid var(--border-light);
  font-size: 0.875rem;
}

.proc-row:last-child { border-bottom: none; }

.badge {
  display: inline-block;
  background: var(--accent);
  color: var(--text-light);
  font-size: 0.75rem;
  padding: 2px 8px;
  border-radius: 999px;
}

.badge-steps {
  background: var(--bg-muted);
  color: var(--text-muted);
}

.btn-row {
  font-size: 0.75rem;
  padding: 4px 10px;
  border: 1px solid var(--border-light);
  background: var(--bg-primary);
  color: var(--text-primary);
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
}
.btn-row:hover { background: var(--bg-muted); }
.btn-row-danger { color: var(--danger); border-color: var(--danger-bg); }
.btn-row-danger:hover { background: var(--danger-bg); }

/* Form */
.form-card {
  background: var(--bg-primary);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: var(--space-md);
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
}

.form-card h2 {
  font-size: 1.125rem;
  font-weight: 600;
}

.mode-banner {
  display: none;
  background: var(--bg-muted);
  color: var(--text-muted);
  padding: var(--space-xs);
  border-radius: 6px;
  font-size: 0.8125rem;
}
.mode-banner.active { display: block; }

label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  margin-bottom: 4px;
}

input[type="text"],
textarea,
select {
  width: 100%;
  padding: var(--space-xs);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  font-size: 0.875rem;
  font-family: inherit;
  background: var(--bg-primary);
  transition: border-color 0.15s;
}

input[type="text"]:focus,
textarea:focus,
select:focus {
  outline: none;
  border-color: var(--accent);
}

input[type="text"][readonly] {
  background: var(--bg-muted);
  color: var(--text-muted);
  cursor: not-allowed;
}

input[type="file"] {
  font-size: 0.8125rem;
}

.field-group {
  display: flex;
  flex-direction: column;
}

/* Step cards */
.steps-section h3 {
  font-size: 0.9375rem;
  margin-bottom: var(--space-xs);
}

.step-card {
  background: var(--bg-muted);
  border: 2px solid transparent;
  border-radius: var(--radius);
  padding: var(--space-sm);
  margin-bottom: var(--space-xs);
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  cursor: pointer;
  transition: border-color 0.15s, opacity 0.15s;
  position: relative;
}

.step-card.focused {
  border-color: var(--accent);
}

.step-card.dragging {
  opacity: 0.4;
}

.step-card.drag-over {
  border-color: var(--accent);
  border-style: dashed;
}

.step-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.step-card-header-left {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}

.drag-handle {
  cursor: grab;
  color: var(--text-disabled);
  font-size: 1.125rem;
  user-select: none;
  padding: 0 4px;
  line-height: 1;
}
.drag-handle:active { cursor: grabbing; }

.step-badge {
  background: var(--accent);
  color: var(--text-light);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 2px 10px;
  border-radius: 999px;
}

.btn-remove-step {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 2px 4px;
}

.step-existing-image {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  padding: var(--space-xs);
  background: rgba(255,255,255,0.6);
  border-radius: 6px;
}

.step-thumb {
  width: 56px;
  height: 56px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--border-light);
  flex-shrink: 0;
}

.step-existing-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
  flex: 1;
}
.step-existing-label {
  font-size: 0.75rem;
  color: var(--text-muted);
}
.step-existing-path {
  font-size: 0.75rem;
  color: var(--text-disabled);
  font-family: ui-monospace, "SF Mono", Menlo, Monaco, monospace;
  word-break: break-all;
}

.btn-add-step {
  background: none;
  border: 2px dashed var(--border-light);
  border-radius: var(--radius);
  padding: var(--space-xs) var(--space-sm);
  cursor: pointer;
  font-size: 0.875rem;
  color: var(--accent);
  width: 100%;
  transition: border-color 0.15s;
  font-family: inherit;
}

.btn-add-step:hover {
  border-color: var(--accent);
}

.btn-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: var(--text-light);
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}

.btn-submit:hover {
  background: var(--accent-hover);
}

.btn-submit:disabled {
  background: var(--text-disabled);
  cursor: not-allowed;
}

.btn-cancel {
  width: 100%;
  padding: 8px;
  background: none;
  color: var(--text-muted);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.875rem;
  font-family: inherit;
  display: none;
}
.btn-cancel.active { display: block; }
.btn-cancel:hover { background: var(--bg-muted); }

/* Status area */
.status {
  padding: var(--space-sm);
  border-radius: var(--radius);
  font-size: 0.875rem;
  display: none;
}

.status.success {
  display: block;
  background: #e6f9ee;
  color: #1a7a3a;
}

.status.error {
  display: block;
  background: var(--danger-bg);
  color: var(--danger);
}

.status a {
  color: inherit;
  font-weight: 600;
}

/* Right column — preview */
.right-col {
  position: sticky;
  top: var(--space-md);
  align-self: start;
  height: calc(100vh - 2 * var(--space-md));
  display: flex;
  flex-direction: column;
}

.preview-wrapper {
  background: var(--bg-dark);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.preview-title {
  color: var(--text-light);
  font-size: 0.875rem;
  font-weight: 600;
  padding: var(--space-xs) var(--space-sm);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.preview-viewport {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.preview-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.preview-placeholder {
  width: 100%;
  height: 100%;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-disabled);
  font-size: 0.875rem;
}

.preview-indicator {
  position: absolute;
  top: var(--space-xs);
  right: var(--space-sm);
  color: var(--text-light);
  font-size: 0.8125rem;
  background: rgba(0,0,0,0.5);
  padding: 2px 8px;
  border-radius: 999px;
}

.preview-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--overlay);
  color: var(--text-light);
  padding: var(--space-sm);
}

.preview-overlay h3 {
  font-size: 1rem;
  margin-bottom: 4px;
}

.preview-overlay p {
  font-size: 0.8125rem;
  opacity: 0.85;
  line-height: 1.4;
}

.preview-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.15);
  border: none;
  color: var(--text-light);
  font-size: 1.25rem;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.preview-nav:hover {
  background: rgba(255,255,255,0.3);
}

.preview-nav.prev { left: var(--space-xs); }
.preview-nav.next { right: var(--space-xs); }
</style>
</head>
<body>

<div class="layout">
  <!-- Left column -->
  <div class="left-col">
    <div class="header">
      <h1>衛教管理</h1>
      <a href="/" target="_blank">主站 ↗</a>
    </div>

    <!-- Existing procedures -->
    <div class="proc-list">
      <h2>現有衛教</h2>
      <div id="procListContent">
        <div class="proc-list-empty">載入中…</div>
      </div>
    </div>

    <!-- New / edit procedure form -->
    <form id="procForm" class="form-card" autocomplete="off">
      <h2 id="formTitle">新增衛教</h2>

      <div id="modeBanner" class="mode-banner"></div>

      <div class="field-group">
        <label for="procId">識別碼</label>
        <input type="text" id="procId" name="id" required pattern="[a-z0-9\-]+" placeholder="e.g. tonsillectomy">
      </div>

      <div class="field-group">
        <label for="procTitle">標題（中文）</label>
        <input type="text" id="procTitle" name="title" required>
      </div>

      <div class="field-group">
        <label for="procCategory">分類</label>
        <select id="procCategory" name="category" required>
          <option value="" disabled selected>選擇分類…</option>
        </select>
      </div>

      <div class="steps-section">
        <h3>步驟（拖曳左側 ≡ 可調整順序）</h3>
        <div id="stepsContainer"></div>
        <button type="button" class="btn-add-step" id="btnAddStep">➕ 新增步驟</button>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">建立衛教</button>
      <button type="button" class="btn-cancel" id="btnCancel">取消編輯</button>

      <div id="statusArea" class="status"></div>
    </form>
  </div>

  <!-- Right column — live preview -->
  <div class="right-col">
    <div class="preview-wrapper">
      <div class="preview-title">預覽</div>
      <div class="preview-viewport" id="previewViewport">
        <div class="preview-placeholder" id="previewPlaceholder">尚無圖片</div>
        <img class="preview-image" id="previewImage" style="display:none" alt="">
        <div class="preview-indicator" id="previewIndicator">0 / 0</div>
        <div class="preview-overlay" id="previewOverlay">
          <h3 id="previewStepTitle">步驟標題</h3>
          <p id="previewStepDesc">說明文字</p>
        </div>
        <button class="preview-nav prev" id="btnPrev" title="上一步">◀</button>
        <button class="preview-nav next" id="btnNext" title="下一步">▶</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  // Local-only tool: admin.js (Node) is required for the /api/* endpoints.
  // GitHub Pages can't run the server, so bail out with a clear message
  // instead of letting fetch() failures render as a broken UI.
  var host = location.hostname;
  var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '::1' || host === '';
  if (!isLocal) {
    document.title = '衛教管理 — 僅限本機使用';
    while (document.body.firstChild) document.body.removeChild(document.body.firstChild);

    var card = document.createElement('div');
    card.style.cssText =
      'max-width:560px;margin:10vh auto;padding:32px;background:#fff;' +
      'border-radius:12px;box-shadow:0 4px 16px rgba(15,42,66,0.08);' +
      "font-family:'Noto Sans TC',-apple-system,sans-serif;color:#0f2a42;line-height:1.6;";

    var h1 = document.createElement('h1');
    h1.style.cssText = 'font-size:1.5rem;margin-bottom:16px;color:#0e7c7b;';
    h1.textContent = '衛教管理工具';
    card.appendChild(h1);

    var pStrong = document.createElement('p');
    pStrong.style.cssText = 'margin-bottom:12px;';
    var strong = document.createElement('strong');
    strong.textContent = '此工具僅供診間本機編輯使用。';
    pStrong.appendChild(strong);
    card.appendChild(pStrong);

    var pInfo = document.createElement('p');
    pInfo.style.cssText = 'margin-bottom:16px;color:#56706c;';
    pInfo.textContent = 'admin 介面需要本機 Node server 才能存取 / 寫入衛教資料,GitHub Pages 是純靜態主機,無法執行後端。';
    card.appendChild(pInfo);

    var pCmdLabel = document.createElement('p');
    pCmdLabel.style.cssText = 'margin-bottom:8px;font-weight:600;';
    pCmdLabel.textContent = '在本機開啟方式:';
    card.appendChild(pCmdLabel);

    var pre = document.createElement('pre');
    pre.style.cssText =
      'background:#f5faf8;padding:12px 16px;border-radius:8px;' +
      "font-family:'SF Mono',Menlo,Consolas,monospace;font-size:0.875rem;" +
      'border:1px solid #eaf2ef;margin-bottom:20px;overflow-x:auto;';
    pre.textContent =
      'git clone … && cd entexplainpage\n' +
      'npm install\n' +
      'npm run admin\n' +
      '# 開啟 http://localhost:3001/admin.html';
    card.appendChild(pre);

    var pBack = document.createElement('p');
    pBack.style.cssText = 'margin-bottom:0;';
    var a = document.createElement('a');
    a.href = './';
    a.style.cssText = 'color:#0e7c7b;text-decoration:none;font-weight:600;';
    a.textContent = '← 回到主站';
    pBack.appendChild(a);
    card.appendChild(pBack);

    document.body.appendChild(card);
    return;
  }

  // Same-origin: admin.js serves both /api/* and the main site's static files.
  var API_BASE = '';
  var SITE_BASE = '';
  var focusedStepIndex = 0;
  var mode = 'add';        // 'add' | 'edit'
  var editingId = null;
  var draggedCard = null;

  // Form refs
  var procListContent = document.getElementById('procListContent');
  var formTitle = document.getElementById('formTitle');
  var modeBanner = document.getElementById('modeBanner');
  var procId = document.getElementById('procId');
  var procTitle = document.getElementById('procTitle');
  var procCategory = document.getElementById('procCategory');
  var stepsContainer = document.getElementById('stepsContainer');
  var btnAddStep = document.getElementById('btnAddStep');
  var procForm = document.getElementById('procForm');
  var statusArea = document.getElementById('statusArea');
  var btnSubmit = document.getElementById('btnSubmit');
  var btnCancel = document.getElementById('btnCancel');

  // Preview refs
  var previewImage = document.getElementById('previewImage');
  var previewPlaceholder = document.getElementById('previewPlaceholder');
  var previewIndicator = document.getElementById('previewIndicator');
  var previewStepTitle = document.getElementById('previewStepTitle');
  var previewStepDesc = document.getElementById('previewStepDesc');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');

  // ── Helpers ──
  function el(tag, className, textContent) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (textContent !== undefined) node.textContent = textContent;
    return node;
  }

  function clear(node) {
    while (node.firstChild) node.removeChild(node.firstChild);
  }

  // ── Load index ──
  function loadIndex() {
    fetch(API_BASE + '/api/index')
      .then(function (res) {
        if (!res.ok) throw new Error('Failed to fetch index');
        return res.json();
      })
      .then(function (data) {
        // Categories
        var currentCategoryValue = procCategory.value;
        clear(procCategory);
        var defaultOpt = document.createElement('option');
        defaultOpt.value = '';
        defaultOpt.disabled = true;
        defaultOpt.selected = true;
        defaultOpt.textContent = '選擇分類…';
        procCategory.appendChild(defaultOpt);
        (data.categories || []).forEach(function (cat) {
          var opt = document.createElement('option');
          opt.value = cat.id || cat;
          opt.textContent = cat.title || cat;
          procCategory.appendChild(opt);
        });
        if (currentCategoryValue) procCategory.value = currentCategoryValue;

        // Procedures
        var procs = data.procedures || [];
        clear(procListContent);
        if (procs.length === 0) {
          procListContent.appendChild(el('div', 'proc-list-empty', '尚無衛教資料'));
        } else {
          procs.forEach(function (p) {
            var row = el('div', 'proc-row');

            var titleSpan = el('span', null, p.title || p.id);
            titleSpan.style.flex = '1';
            row.appendChild(titleSpan);

            row.appendChild(el('span', 'badge', p.category || ''));

            var editBtn = el('button', 'btn-row', '編輯');
            editBtn.type = 'button';
            editBtn.addEventListener('click', function () { enterEditMode(p.id, p.category); });
            row.appendChild(editBtn);

            var delBtn = el('button', 'btn-row btn-row-danger', '刪除');
            delBtn.type = 'button';
            delBtn.addEventListener('click', function () { deleteProc(p.id, p.title); });
            row.appendChild(delBtn);

            procListContent.appendChild(row);
          });
        }
      })
      .catch(function (err) {
        clear(procListContent);
        procListContent.appendChild(el('div', 'proc-list-empty', '無法載入：' + err.message));
      });
  }

  // ── Step management ──
  function getStepCards() {
    return Array.from(stepsContainer.querySelectorAll('.step-card'));
  }

  function renumberSteps() {
    var cards = getStepCards();
    cards.forEach(function (card, i) {
      card.dataset.index = i;
      card.querySelector('.step-badge').textContent = '步驟 ' + (i + 1);
      var removeBtn = card.querySelector('.btn-remove-step');
      removeBtn.style.display = cards.length <= 1 ? 'none' : '';
    });
  }

  function buildField(labelText, inputEl) {
    var group = el('div', 'field-group');
    group.appendChild(el('label', null, labelText));
    group.appendChild(inputEl);
    return group;
  }

  function createStepCard(initial) {
    initial = initial || {};
    var card = el('div', 'step-card');
    card.draggable = true;

    // Header — drag handle + badge + remove
    var header = el('div', 'step-card-header');
    var leftSide = el('div', 'step-card-header-left');
    var dragHandle = el('span', 'drag-handle', '☰'); // ≡
    dragHandle.title = '拖曳調整順序';
    var badge = el('span', 'step-badge', '步驟 ?');
    leftSide.appendChild(dragHandle);
    leftSide.appendChild(badge);
    header.appendChild(leftSide);

    var removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'btn-remove-step';
    removeBtn.title = '移除步驟';
    removeBtn.textContent = '❌';
    header.appendChild(removeBtn);
    card.appendChild(header);

    // Title (required)
    var titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.className = 'step-title';
    titleInput.required = true;
    if (initial.title) titleInput.value = initial.title;
    card.appendChild(buildField('步驟標題', titleInput));

    // Description (optional)
    var descArea = document.createElement('textarea');
    descArea.className = 'step-desc';
    descArea.rows = 3;
    if (initial.description) descArea.value = initial.description;
    card.appendChild(buildField('說明（選填）', descArea));

    // Hidden alt — preserve existing data without exposing UI
    var altHidden = document.createElement('input');
    altHidden.type = 'hidden';
    altHidden.className = 'step-alt';
    altHidden.value = initial.alt || '';
    card.appendChild(altHidden);

    // Hidden image path (existing)
    var imagePathHidden = document.createElement('input');
    imagePathHidden.type = 'hidden';
    imagePathHidden.className = 'step-image-path';
    imagePathHidden.value = initial.image || '';
    card.appendChild(imagePathHidden);

    // Existing image preview
    if (initial.image) {
      var thumbWrap = el('div', 'step-existing-image');
      var thumbImg = document.createElement('img');
      thumbImg.src = SITE_BASE + '/' + initial.image + '?t=' + Date.now();
      thumbImg.alt = '';
      thumbImg.className = 'step-thumb';
      thumbImg.onerror = function () { thumbWrap.style.display = 'none'; };
      thumbWrap.appendChild(thumbImg);

      var meta = el('div', 'step-existing-meta');
      meta.appendChild(el('span', 'step-existing-label', '目前圖片'));
      meta.appendChild(el('span', 'step-existing-path', initial.image.split('/').pop()));
      thumbWrap.appendChild(meta);
      card.appendChild(thumbWrap);
    }

    // File input
    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.className = 'step-image';
    fileInput.accept = 'image/*';
    fileInput.required = !initial.image;
    var fileLabel = initial.image ? '替換圖片（選填）' : '圖片';
    card.appendChild(buildField(fileLabel, fileInput));

    // Click → focus
    card.addEventListener('click', function (e) {
      if (e.target.closest('.btn-remove-step')) return;
      if (e.target.closest('.drag-handle')) return;
      focusStep(parseInt(card.dataset.index, 10));
    });

    removeBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      removeStep(card);
    });

    // Drag handlers
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragover', onDragOver);
    card.addEventListener('dragleave', onDragLeave);
    card.addEventListener('drop', onDrop);
    card.addEventListener('dragend', onDragEnd);

    // Live preview
    [titleInput, descArea].forEach(function (inp) {
      inp.addEventListener('input', function () {
        if (parseInt(card.dataset.index, 10) === focusedStepIndex) updatePreview();
      });
    });
    fileInput.addEventListener('change', function () {
      if (parseInt(card.dataset.index, 10) === focusedStepIndex) updatePreview();
    });

    return card;
  }

  // ── Drag-and-drop reorder ──
  function onDragStart(e) {
    draggedCard = this;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    try { e.dataTransfer.setData('text/plain', this.dataset.index || ''); } catch (_) {}
  }

  function onDragOver(e) {
    if (!draggedCard || draggedCard === this) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    this.classList.add('drag-over');
  }

  function onDragLeave() {
    this.classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (!draggedCard || draggedCard === this) return;
    var rect = this.getBoundingClientRect();
    var dropAfter = (e.clientY - rect.top) > rect.height / 2;
    if (dropAfter) {
      this.parentNode.insertBefore(draggedCard, this.nextSibling);
    } else {
      this.parentNode.insertBefore(draggedCard, this);
    }
    renumberSteps();
    focusStep(parseInt(draggedCard.dataset.index, 10));
  }

  function onDragEnd() {
    if (draggedCard) draggedCard.classList.remove('dragging');
    getStepCards().forEach(function (c) { c.classList.remove('drag-over'); });
    draggedCard = null;
  }

  // ── Step CRUD ──
  function addStep(initial) {
    var card = createStepCard(initial);
    stepsContainer.appendChild(card);
    renumberSteps();
    focusStep(getStepCards().length - 1);
  }

  function removeStep(stepEl) {
    if (getStepCards().length <= 1) return;
    stepEl.remove();
    renumberSteps();
    var remaining = getStepCards();
    focusedStepIndex = Math.min(focusedStepIndex, Math.max(0, remaining.length - 1));
    focusStep(focusedStepIndex);
  }

  function focusStep(index) {
    var cards = getStepCards();
    if (cards.length === 0) return;
    if (index < 0) index = 0;
    if (index >= cards.length) index = cards.length - 1;
    focusedStepIndex = index;
    cards.forEach(function (c, i) { c.classList.toggle('focused', i === index); });
    updatePreview();
  }

  // ── Preview ──
  function updatePreview() {
    var cards = getStepCards();
    var total = cards.length;
    previewIndicator.textContent = (total === 0) ? '0 / 0' : (focusedStepIndex + 1) + ' / ' + total;

    if (total === 0) {
      previewStepTitle.textContent = '步驟標題';
      previewStepDesc.textContent = '說明文字';
      previewImage.style.display = 'none';
      previewPlaceholder.style.display = 'flex';
      return;
    }

    var card = cards[focusedStepIndex];
    var title = card.querySelector('.step-title').value || '步驟標題';
    var desc = card.querySelector('.step-desc').value || '說明文字';
    var fileInput = card.querySelector('.step-image');
    var existingPath = card.querySelector('.step-image-path').value;

    previewStepTitle.textContent = title;
    previewStepDesc.textContent = desc;

    if (fileInput.files && fileInput.files[0]) {
      var url = URL.createObjectURL(fileInput.files[0]);
      if (previewImage._blobUrl) URL.revokeObjectURL(previewImage._blobUrl);
      previewImage._blobUrl = url;
      previewImage.onload = function () {
        URL.revokeObjectURL(url);
        previewImage._blobUrl = null;
      };
      previewImage.onerror = function () {
        URL.revokeObjectURL(url);
        previewImage._blobUrl = null;
        previewImage.style.display = 'none';
        previewPlaceholder.style.display = 'flex';
      };
      previewImage.src = url;
      previewImage.alt = '';
      previewImage.style.display = 'block';
      previewPlaceholder.style.display = 'none';
    } else if (existingPath) {
      previewImage.onload = null;
      previewImage.onerror = function () {
        previewImage.style.display = 'none';
        previewPlaceholder.style.display = 'flex';
      };
      previewImage.src = SITE_BASE + '/' + existingPath + '?t=' + Date.now();
      previewImage.alt = '';
      previewImage.style.display = 'block';
      previewPlaceholder.style.display = 'none';
    } else {
      previewImage.style.display = 'none';
      previewPlaceholder.style.display = 'flex';
    }
  }

  btnPrev.addEventListener('click', function () { focusStep(focusedStepIndex - 1); });
  btnNext.addEventListener('click', function () { focusStep(focusedStepIndex + 1); });

  // ── Edit / Delete ──
  function enterEditMode(id, fallbackCategory) {
    fetch(API_BASE + '/api/procedures/' + encodeURIComponent(id))
      .then(function (res) {
        if (!res.ok) {
          return res.text().then(function (t) { throw new Error('讀取失敗 (' + res.status + ')：' + t); });
        }
        return res.json();
      })
      .then(function (data) {
        mode = 'edit';
        editingId = id;
        formTitle.textContent = '編輯衛教';
        modeBanner.textContent = '編輯中：' + (data.title || data.id) + '（識別碼鎖定）';
        modeBanner.classList.add('active');
        procId.value = data.id;
        procId.readOnly = true;
        procTitle.value = data.title || '';
        procCategory.value = data.category || fallbackCategory || '';
        clear(stepsContainer);
        var steps = (data.steps && data.steps.length) ? data.steps : [{}];
        steps.forEach(function (s) { addStep(s); });
        focusStep(0);
        btnSubmit.textContent = '儲存變更';
        btnCancel.classList.add('active');
        statusArea.style.display = 'none';
        statusArea.className = 'status';
        procForm.scrollIntoView({ behavior: 'smooth', block: 'start' });
      })
      .catch(function (err) {
        statusArea.className = 'status error';
        statusArea.textContent = '❌ ' + err.message;
        statusArea.style.display = 'block';
      });
  }

  function exitEditMode() {
    mode = 'add';
    editingId = null;
    formTitle.textContent = '新增衛教';
    modeBanner.classList.remove('active');
    modeBanner.textContent = '';
    procForm.reset();
    procId.readOnly = false;
    clear(stepsContainer);
    addStep();
    focusStep(0);
    btnSubmit.textContent = '建立衛教';
    btnCancel.classList.remove('active');
  }

  function deleteProc(id, title) {
    var label = title || id;
    var msg = '確定刪除「' + label + '」？\n\n會連同 procedures/' + id + '.json 與 images/' + id + '/ 資料夾一併刪除，無法復原。';
    if (!window.confirm(msg)) return;
    fetch(API_BASE + '/api/procedures/' + encodeURIComponent(id), { method: 'DELETE' })
      .then(function (res) {
        if (!res.ok) {
          return res.text().then(function (t) { throw new Error('刪除失敗 (' + res.status + ')：' + t); });
        }
        return res.json();
      })
      .then(function () {
        statusArea.className = 'status success';
        statusArea.textContent = '✅ 已刪除：' + id;
        statusArea.style.display = 'block';
        if (mode === 'edit' && editingId === id) exitEditMode();
        loadIndex();
      })
      .catch(function (err) {
        statusArea.className = 'status error';
        statusArea.textContent = '❌ ' + err.message;
        statusArea.style.display = 'block';
      });
  }

  // ── Submit ──
  function showSuccess(msg, id) {
    statusArea.className = 'status success';
    clear(statusArea);
    statusArea.appendChild(document.createTextNode('✅ ' + msg + ' '));
    var link = document.createElement('a');
    link.href = SITE_BASE + '/#/' + id;
    link.target = '_blank';
    link.textContent = '在主站查看';
    statusArea.appendChild(link);
    statusArea.style.display = 'block';
  }

  function showError(err) {
    statusArea.className = 'status error';
    statusArea.textContent = '❌ ' + err.message;
    statusArea.style.display = 'block';
  }

  function submitForm(e) {
    e.preventDefault();
    statusArea.style.display = 'none';
    statusArea.className = 'status';
    btnSubmit.disabled = true;
    var originalText = btnSubmit.textContent;
    btnSubmit.textContent = '提交中…';

    var title = procTitle.value.trim();
    var category = procCategory.value;
    var cards = getStepCards();

    var done = function () {
      btnSubmit.disabled = false;
      btnSubmit.textContent = originalText;
    };

    if (mode === 'add') {
      submitAdd(procId.value.trim(), title, category, cards).then(done, function (err) { showError(err); done(); });
    } else {
      submitEdit(editingId, title, category, cards).then(done, function (err) { showError(err); done(); });
    }
  }

  function submitAdd(id, title, category, cards) {
    var steps = cards.map(function (card) {
      return {
        title: card.querySelector('.step-title').value.trim(),
        description: card.querySelector('.step-desc').value.trim(),
        alt: card.querySelector('.step-alt').value || ''
      };
    });

    return fetch(API_BASE + '/api/procedures', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, title: title, category: category, steps: steps })
    })
      .then(function (res) {
        if (!res.ok) return res.text().then(function (t) { throw new Error('建立失敗 (' + res.status + ')：' + t); });
        return res.json();
      })
      .then(function () {
        var fd = new FormData();
        var thumbAppended = false;
        cards.forEach(function (card, i) {
          var fi = card.querySelector('.step-image');
          if (fi.files && fi.files[0]) {
            if (!thumbAppended) { fd.append('thumb', fi.files[0]); thumbAppended = true; }
            fd.append('step' + (i + 1), fi.files[0]);
          }
        });
        return fetch(API_BASE + '/api/procedures/' + encodeURIComponent(id) + '/images', {
          method: 'POST', body: fd
        }).then(function (res2) {
          if (!res2.ok) return res2.text().then(function (t) { throw new Error('圖片上傳失敗 (' + res2.status + ')：' + t); });
        });
      })
      .then(function () {
        showSuccess('建立完成！', id);
        exitEditMode();
        loadIndex();
      });
  }

  function submitEdit(id, title, category, cards) {
    var fd = new FormData();
    var steps = cards.map(function (card, i) {
      var fi = card.querySelector('.step-image');
      var hasNewFile = fi.files && fi.files[0];
      if (hasNewFile) fd.append('step' + (i + 1) + '_image', fi.files[0]);
      return {
        title: card.querySelector('.step-title').value.trim(),
        description: card.querySelector('.step-desc').value.trim(),
        alt: card.querySelector('.step-alt').value || '',
        image: hasNewFile ? '' : card.querySelector('.step-image-path').value
      };
    });

    fd.append('payload', JSON.stringify({ title: title, category: category, steps: steps }));

    return fetch(API_BASE + '/api/procedures/' + encodeURIComponent(id), {
      method: 'PUT', body: fd
    })
      .then(function (res) {
        if (!res.ok) return res.text().then(function (t) { throw new Error('儲存失敗 (' + res.status + ')：' + t); });
        return res.json();
      })
      .then(function () {
        showSuccess('已儲存變更！', id);
        exitEditMode();
        loadIndex();
      });
  }

  // ── Init ──
  btnAddStep.addEventListener('click', function () { addStep(); });
  btnCancel.addEventListener('click', exitEditMode);
  procForm.addEventListener('submit', submitForm);

  addStep();
  loadIndex();
})();
</script>
</body>
